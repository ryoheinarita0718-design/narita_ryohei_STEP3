<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TNG CAFE</title>
  <link rel="stylesheet" href="test.css">
</head>

<body>
    
<header>
    <h1>TNG CAFE</h1>
    <p>心安らぐ一杯をあなたに</p>
</header>

<nav>
    <ul>
        <li><a href="#section1">About Us</a></li>
        <li><a href="#section2">Menu</a></li>
        <li><a href="#section3">Contact</a></li>
    </ul>
</nav>

<main>

    <section id="section1">
        <h2>About Us</h2>
        <p>TNGCafeは自然の香りに包まれたリラックス空間を提供しています。<br>
            自家焙煎コーヒーと手作りスイーツで、穏やかな空間をお過ごしください。
        </p>
        <img src="cafe.jpg" alt="カフェの写真">
    </section>

<section id="section2">
    <h2>Menu</h2>
    <div class="menu-wrapper">
        <div class="menu-item">
            <img src="coffee.PNG" alt="コーヒー" width="300">
    <p>ブレンドコーヒー</p>
    </div>

    <div class="menu-item">
    <img src="baked_cheesecake.PNG" alt="ケーキ" width="300">
    <p>ベイクドチーズケーキ</p>
    </div>
    <div class="menu-item">
    <img src="cafelatte.PNG" alt="ラテ" width="300">
    <p>カフェラテ</p>
</div>
</div>
</section>

<section id="section3">
    <h2>Contact</h2>
    <form action="#" method="post">
        <label for="name">お名前</label>
        <input type="text" id="name" name="name">

    <label for="email">メールアドレス：</label>
    <input type="email" id="email" name="email">

    <label for="message">お問い合わせ内容：</label>
    <textarea name="message" id="message" rows="4" cols="40"></textarea>

    <button type="submit">送信</button>

    </form>
</section>

</main>

<footer>
    <p>&copy; 2026 TNG Cafe</p>
</footer>

</body>
</html>
